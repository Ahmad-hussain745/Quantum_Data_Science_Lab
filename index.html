<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>My Google AI Studio App</title>
    <script>
      // Suppress sandboxed iframe extension noise (e.g., MetaMask/Web3 wallets failing to connect inside sandboxed preview contexts)
      (function() {
        // Intercept and sanitize console.error / console.warn to suppress external extension/MetaMask noise
        const originalConsoleError = console.error;
        console.error = function(...args) {
          const msg = args.map(arg => {
            try {
              return typeof arg === 'object' ? JSON.stringify(arg) : String(arg);
            } catch (e) {
              return String(arg);
            }
          }).join(' ');
          if (
            msg.includes('MetaMask') || 
            msg.includes('metamask') || 
            msg.includes('ethereum') || 
            msg.includes('wallet') || 
            msg.includes('RPC') ||
            msg.includes('provider')
          ) {
            // Silently suppress external extension errors
            return;
          }
          originalConsoleError.apply(console, args);
        };

        const originalConsoleWarn = console.warn;
        console.warn = function(...args) {
          const msg = args.map(arg => {
            try {
              return typeof arg === 'object' ? JSON.stringify(arg) : String(arg);
            } catch (e) {
              return String(arg);
            }
          }).join(' ');
          if (
            msg.includes('MetaMask') || 
            msg.includes('metamask') || 
            msg.includes('ethereum') || 
            msg.includes('wallet') || 
            msg.includes('RPC') ||
            msg.includes('provider')
          ) {
            return;
          }
          originalConsoleWarn.apply(console, args);
        };

        // Stub window.ethereum to bypass MetaMask connection failures in sandboxed iframe
        Object.defineProperty(window, 'ethereum', {
          get() {
            return {
              isMetaMask: true,
              request: async (args) => {
                if (!args || !args.method) return null;
                const method = args.method;
                if (method === 'eth_requestAccounts' || method === 'eth_accounts') {
                  return ["0x71C7656EC7ab88b098defB751B7401B5f6d1476B"];
                }
                if (method === 'eth_chainId') {
                  return '0x1'; // Mainnet
                }
                if (method === 'net_version') {
                  return '1';
                }
                if (method === 'eth_blockNumber') {
                  return '0x10d4f12';
                }
                return null;
              },
              on: (event, callback) => {
                // Return dummy listener
                if (event === 'accountsChanged' && callback) {
                  setTimeout(() => callback(["0x71C7656EC7ab88b098defB751B7401B5f6d1476B"]), 100);
                }
                if (event === 'chainChanged' && callback) {
                  setTimeout(() => callback('0x1'), 100);
                }
              },
              removeListener: () => {},
              enable: async () => {
                return ["0x71C7656EC7ab88b098defB751B7401B5f6d1476B"];
              },
              selectedAddress: "0x71C7656EC7ab88b098defB751B7401B5f6d1476B",
              networkVersion: "1",
              chainId: "0x1"
            };
          },
          set() {
            // Allow other scripts to overwrite if needed
          },
          configurable: true
        });

        // Global error listeners
        window.addEventListener('error', function(e) {
          const msg = e.message || '';
          const errorMsg = (e.error && e.error.message) || '';
          if (
            msg.includes('MetaMask') || msg.includes('metamask') || msg.includes('ethereum') || msg.includes('wallet') || msg.includes('Extension') || msg.includes('extension') ||
            errorMsg.includes('MetaMask') || errorMsg.includes('metamask') || errorMsg.includes('ethereum') || errorMsg.includes('wallet') || errorMsg.includes('Extension') || errorMsg.includes('extension')
          ) {
            e.preventDefault();
            e.stopPropagation();
          }
        }, true);
        
        window.addEventListener('unhandledrejection', function(e) {
          const reason = e.reason && (e.reason.message || String(e.reason)) || '';
          if (
            reason.includes('MetaMask') || reason.includes('metamask') || reason.includes('ethereum') || reason.includes('wallet') || reason.includes('Extension') || reason.includes('extension')
          ) {
            e.preventDefault();
            e.stopPropagation();
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
